<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Wishlist | Hameem Bhai er Dokan</title>
  <meta name="description" content="View your saved creative services and lighter cases at HameemBhai er Dokan.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=1.1.8">
  <link rel="stylesheet" href="css/components.css?v=1.1.8">
  <link rel="stylesheet" href="css/layout.css?v=1.1.8">
  <link rel="stylesheet" href="css/pages/catalog.css?v=1.1.8"> <!-- Shares catalog grid layout -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <link rel="icon" href="logoRound.png" type="image/png">
  
  <link rel="shortcut icon" href="logoRound.png" type="image/png">
  <link rel="apple-touch-icon" href="logoRound.png">
  <meta property="og:image:width" content="1000">
  <meta property="og:image:height" content="1000">
  <meta property="og:image:type" content="image/png">

  <!-- SEO & Social Media Meta Tags -->
  <meta name="theme-color" content="#1a1a1a">
  <meta property="og:site_name" content="Hameem Bhai er Dokan">
  <meta property="og:image" content="https://www.hameembhaierdokan.studio/logoRound.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Hameem Bhai er Dokan">
  <meta name="twitter:image" content="https://www.hameembhaierdokan.studio/logoRound.png">
</head>
<body>

  <header id="hbd-header"></header>

  <main id="main-content">

    <!-- Breadcrumb -->
    <nav class="breadcrumb container" aria-label="Breadcrumb">
      <a href="index.html" class="breadcrumb__link">Home</a>
      <span class="breadcrumb__sep">›</span>
      <span class="breadcrumb__current">Your Wishlist</span>
    </nav>

    <section class="wishlist-section section">
      <div class="container">
        <div class="catalog__header" data-animate="fade-up" style="margin-bottom: 40px;">
          <h1 class="catalog__title">Your Saved Wishlist ❤️</h1>
          <p class="catalog__subtitle">Your favorite service packages. Add them to your order brief when ready.</p>
        </div>

        <!-- Wishlist Grid -->
        <div class="catalog__grid" id="wishlist-grid" style="display:none;">
          <!-- Dynamically populated -->
        </div>

        <!-- Empty Wishlist State -->
        <div class="catalog__no-results" id="wishlist-empty" style="display:none;" data-animate="fade-up">
          <div class="catalog__no-results-icon">❤️</div>
          <h3 class="catalog__no-results-title">Your Wishlist is Empty</h3>
          <p class="catalog__no-results-text">Browse HameemBhai's services, click the heart icon on any card, and save them here!</p>
          <a href="services.html" class="hbd-btn hbd-btn--primary" style="margin-top: 15px;">Explore Services 🔥</a>
        </div>

      </div>
    </section>

  </main>

  <footer id="hbd-footer"></footer>

  <script src="js/content-store.js?v=1.1.8"></script>
  <script src="js/utils.js?v=1.1.8"></script>
  <script src="js/data.js?v=1.1.8"></script>
  <script src="js/store.js?v=1.1.8"></script>
  <script src="js/components.js?v=1.1.8"></script>
  <script src="js/email-service.js?v=1.1.8"></script>

  <script src="js/pages/wishlist.js?v=1.1.8"></script>
  <script src="js/premium-effects.js?v=1.1.8"></script>

</body>
</html>
