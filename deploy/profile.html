<!DOCTYPE html>
<html lang="en">
<head>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Profile | Hameem Bhai er Dokan</title>
  <meta name="description" content="View and update your user profile, claim customer discounts, and copy referral promo codes.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/base.css?v=1.1.4">
  <link rel="stylesheet" href="css/components.css?v=1.1.4">
  <link rel="stylesheet" href="css/layout.css?v=1.1.4">
  <link rel="stylesheet" href="css/pages/login.css?v=1.1.4"> <!-- Shares panel card styling -->
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="favicon.png" type="image/png">
</head>
<body>

  <header id="hbd-header"></header>

  <main id="main-content">

    <section class="auth-section section">
      <div class="auth-shapes">
        <div class="auth-shape auth-shape--1"></div>
        <div class="auth-shape auth-shape--2"></div>
      </div>

      <div class="container">
        <div class="auth-container" data-animate="fade-up" style="max-width: 650px;">

          <h2 class="auth-pane__title" style="text-align: left; margin-bottom: 5px;">👤 Account Dashboard</h2>
          <p class="auth-pane__subtitle" style="text-align: left; margin-bottom: 25px;">Manage your details and claim your returning member benefits.</p>

          <form id="form-profile" class="auth-form">
            <div class="hbd-form-group">
              <label for="prof-name">Full Name *</label>
              <input type="text" id="prof-name" required placeholder="e.g. Tanvir Ahmed" class="hbd-input" />
            </div>
            <div class="hbd-form-group">
              <label for="prof-email">Email Address *</label>
              <input type="email" id="prof-email" required placeholder="you@example.com" class="hbd-input" />
            </div>
            <div class="hbd-form-group">
              <label for="prof-phone">Phone Number *</label>
              <input type="tel" id="prof-phone" required placeholder="e.g. +880 1XXXXXXXXX" class="hbd-input" />
            </div>
            <div class="hbd-form-group">
              <label for="prof-address">Delivery / Shipping Address</label>
              <input type="text" id="prof-address" placeholder="e.g. House 12, Road 4, Dhanmondi, Dhaka" class="hbd-input" />
            </div>

            <div class="membership-badge-card" id="membership-badge-card" style="margin: 20px 0; padding: 15px; border-radius: 12px; background: rgba(255,255,255,0.03); border: 1px solid var(--border-color); display: flex; align-items: center; gap: 15px;">
              <span style="font-size: 28px;">🌟</span>
              <div>
                <strong style="color: var(--accent-pink);">Returning Customer Status</strong>
                <p id="prof-status-desc" style="font-size: 13px; color: var(--text-muted); margin-top: 4px;">Loading...</p>
              </div>
            </div>

            <div style="display: flex; gap: 15px;">
              <button type="submit" class="hbd-btn hbd-btn--primary" style="flex: 1;">Update Profile ✓</button>
              <a href="orders.html" class="hbd-btn hbd-btn--outline" style="flex: 1; text-align: center; display: block; padding-top: 10px;">View Orders 📋</a>
            </div>
          </form>

        </div>
      </div>
    </section>

  </main>

  <footer id="hbd-footer"></footer>

  <script src="js/content-store.js?v=1.1.4"></script>
  <script src="js/utils.js?v=1.1.4"></script>
  <script src="js/data.js?v=1.1.4"></script>
  <script src="js/store.js?v=1.1.4"></script>
  <script src="js/components.js?v=1.1.4"></script>
  <script src="js/email-service.js?v=1.1.4"></script>

  <script src="js/pages/profile.js?v=1.1.4"></script>
  <script src="js/premium-effects.js?v=1.1.4"></script>
</body>
</html>
